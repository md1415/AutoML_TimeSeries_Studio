<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoML Time Series Studio - Advanced Dashboard</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/lib/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 AutoML Time Series Studio</h1>
            <p>Advanced Dashboard | Model Comparison | Confidence Intervals</p>
        </header>

        <div class="upload-section">
            <h2>Step 1: Upload Time Series Data</h2>
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept=".csv" hidden>
                <button id="uploadBtn" class="btn-primary">📁 Select CSV File</button>
                <div id="uploadStatus"></div>
            </div>
        </div>

        <div class="forecast-section" id="forecastSection" style="display: none;">
            <h2>Step 2: Configure Forecast</h2>
            <div class="config-panel">
                <div class="config-row">
                    <label>
                        Forecast Horizon (days):
                        <input type="number" id="horizon" min="1" max="365" value="10">
                    </label>
                    <label>
                        <input type="checkbox" id="includeConfidence" checked>
                        Show Confidence Intervals
                    </label>
                    <label>
                        <input type="checkbox" id="compareModels">
                        Compare All Models
                    </label>
                </div>
                <button id="forecastBtn" class="btn-success">🔮 Generate Forecast</button>
                <div class="download-buttons" style="margin-top: 20px; display: flex; gap: 10px;">
                    <button id="downloadExcelBtn" class="btn-secondary" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">📊 Download Excel Report</button>
                    <button id="downloadPdfBtn" class="btn-secondary" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">📄 Download PDF Report</button>
                </div>
            </div>

            <div id="modelInfo" class="model-info"></div>

            <div class="chart-tabs">
                <button class="tab-btn active" data-tab="forecast">Forecast Chart</button>
                <button class="tab-btn" data-tab="comparison">Model Comparison</button>
                <button class="tab-btn" data-tab="historical">Historical + Forecast</button>
            </div>

            <div class="chart-container">
                <canvas id="forecastChart" width="800" height="400" style="max-width: 100%; height: auto;"></canvas>
                <div id="chartFallback" style="display: none;"></div>
            </div>

            <div id="predictionsTable" class="predictions-table"></div>
        </div>
    </div>

    <script src="/static/js/upload.js"></script>
    <script src="/static/js/forecast_chart.js"></script>
</body>
</html>
