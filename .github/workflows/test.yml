name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]  # <- تصحیح مهم: اضافه شدن 3.9 و 3.10 و 3.11

    steps:
    - uses: actions/checkout@v4  # ارتقا به نسخه 4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5  # ارتقا به نسخه 5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache pip packages
      uses: actions/cache@v4  # ارتقا به نسخه 4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx flake8  # اضافه کردن flake8
    - name: Run tests with coverage
      run: |
        pytest tests/unit/ -v --cov=backend --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4  # ارتقا به نسخه 4
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Run flake8
      run: flake8 backend/ --count --max-complexity=10 --statistic --show-source  # --show-source برای نمایش خطا